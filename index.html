<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <h3 style="color: brown;text-align:center;">
            <u>Student registration</u></h3>
        <label for="FirstName">FirstName:</label>
        <input type="text" placeholder="Enter your first name"/><br>
        <label for="LastName">LastName:</label>
        <input type="text" placeholder="Enter your last name"/><br>
        <label for="Email">Email:</label>
        <input type="email" placeholder="Enter your email"/><br>
        <label for="Mobile">Mobile:</label>
        <input type="tel" placeholder="Enter your mobile number"/><br>
        <label for="Gender">Gender:</label>
        <input type="radio" name="gender" value="male"/>Male
        <input type="radio" name="gender" value="female"/>Female<br>
        <label for="date of birth">Date of Birth:</label>
        <input type="date" placeholder="Enter your date of birth"/><br>
        <label for="Address">Address:</label>
        <input type="text" placeholder="Enter your address"/><br>
        <label for="city">City:</label>
        <input type="text" placeholder="Enter your city"/><br>
        <label for="Area PIN">Area PIN:</label>
        <input type="text" placeholder="Enter your area pin"/><br>
        <select>
            <option>select qualification</option><br>
            <option>BCA</option>
            </select>
    </form>
</body>
</html>
